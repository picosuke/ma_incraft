<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>8-bit Craft: Infinite Dimensions</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: sans-serif; user-select: none; }
        #crosshair { position: fixed; top: 50%; left: 50%; width: 16px; height: 16px; border: 2px solid white; transform: translate(-50%, -50%); mix-blend-mode: difference; display: none; z-index: 10; }
        #ui { position: fixed; top: 10px; left: 10px; color: white; background: rgba(0,0,0,0.7); padding: 10px; border-radius: 5px; font-size: 12px; pointer-events: none; z-index: 10; }
        #hotbar { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); display: flex; gap: 4px; background: rgba(0,0,0,0.8); padding: 6px; border-radius: 4px; z-index: 20; }
        .slot { width: 44px; height: 44px; border: 2px solid #555; background: #333; display: flex; align-items: center; justify-content: center; color: white; border-radius: 4px; font-size: 10px; background-size: cover; image-rendering: pixelated; position: relative; }
        .slot.active { border-color: #00ff00; transform: scale(1.1); box-shadow: 0 0 10px rgba(0,255,0,0.5); }
        #inventory { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: rgba(0,0,0,0.9); padding: 20px; border-radius: 8px; display: none; grid-template-columns: repeat(5, 1fr); gap: 10px; z-index: 200; border: 2px solid #fff; width: 300px; }
        #inv-tabs { grid-column: span 5; display: flex; gap: 5px; margin-bottom: 10px; }
        #inv-tabs button { background: #444; color: white; border: none; padding: 5px; cursor: pointer; font-size: 10px; flex: 1; }
        #inv-tabs button.active { background: #00aa00; }
        #inv-content { display: grid; grid-template-columns: repeat(5, 1fr); gap: 5px; }
        #overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; color: white; background: rgba(0,0,0,0.5); font-size: 24px; cursor: pointer; z-index: 100; }
        #hp-container { position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%); width: 200px; height: 10px; background: #200; border: 1px solid #f00; border-radius: 5px; overflow: hidden; }
        #hp-bar { height: 100%; width: 100%; background: #f00; transition: width 0.2s; }
    </style>
</head>
<body>
    <div id="ui">E:インベントリ | WASD:移動 | /:破壊 \:設置 | 落下で次元移動</div>
    <div id="crosshair"></div>
    <div id="hp-container"><div id="hp-bar"></div></div>
    <div id="hotbar"></div>
    <div id="inventory">
        <div id="inv-tabs">
            <button data-tab="自然" class="active">自然</button>
            <button data-tab="建築">建築</button>
            <button data-tab="芋">芋</button>
        </div>
        <div id="inv-content"></div>
    </div>
    <div id="overlay">START</div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

    <!-- 地形生成Worker -->
    <script id="worker-script" type="text/javascript">
        self.onmessage = function(e) {
            const { cx, cz, dimension, SCALE, SEA_LEVEL, seed } = e.data;
            const CHUNK_SIZE = 16;
            const blocks = [];

            for (let x = 0; x < CHUNK_SIZE; x++) {
                for (let z = 0; z < CHUNK_SIZE; z++) {
                    const wx = cx * CHUNK_SIZE + x;
                    const wz = cz * CHUNK_SIZE + z;
                    const px = wx * SCALE, pz = wz * SCALE;

                    if (dimension === 0) { // Overworld
                        let h = Math.round(Math.sin(wx*0.1+seed)*2 + Math.cos(wz*0.1+seed)*2);
                        const surfaceY = h * SCALE;
                        for (let y = -5 * SCALE; y <= Math.max(surfaceY, SEA_LEVEL); y += SCALE) {
                            let bid = (y <= surfaceY) ? (y < surfaceY - SCALE*2 ? 3 : (y < surfaceY ? 2 : (y<=SEA_LEVEL?7:1))) : 6;
                            blocks.push({ px, py: y, pz, id: bid });
                        }
                    } else { // Satumoworld
                        let h = Math.round(Math.sin(wx*0.05+seed)*3 + 4);
                        const surfaceY = h * SCALE;
                        for (let y = -3 * SCALE; y <= surfaceY; y += SCALE) {
                            let bid = (y === surfaceY) ? 15 : 13;
                            blocks.push({ px, py: y, pz, id: bid });
                        }
                    }
                }
            }
            self.postMessage({ cx, cz, blocks });
        };
    </script>

    <script>
        const SCALE = 4, CHUNK_SIZE = 16, VIEW_DISTANCE = 2, MAX_HP = 20;
        const PHYSICS = { gravity: 0.02, jumpForce: 0.5, moveSpeed: 0.35, stepHeight: 2.8 };
        
        let scene, camera, renderer, instances = {}, worldData = new Map(), loadedChunks = new Map();
        let isPlaying = false, isInvOpen = false, currentDimension = 0, selectedSlot = 0;
        let playerHP = 20, keys = {}, yVel = 0, currentInvTab = "自然";
        
        const ITEM_DEFS = {
            1: { tab: "自然", name: "草" }, 2: { tab: "自然", name: "土" }, 3: { tab: "自然", name: "石" },
            4: { tab: "自然", name: "木" }, 5: { tab: "自然", name: "葉" }, 6: { tab: "自然", name: "水" },
            7: { tab: "自然", name: "砂" }, 13: { tab: "芋", name: "赤土" }, 15: { tab: "芋", name: "赤草" },
            17: { tab: "建築", name: "板材" }, 18: { tab: "建築", name: "光" }
        };
        const inventoryCounts = {}; Object.keys(ITEM_DEFS).forEach(id => inventoryCounts[id] = 64);
        let hotbarItems = [1, 2, 3, 4, 17, 7, 6, 18, 15, 13];

        const blob = new Blob([document.getElementById('worker-script').textContent], { type: 'text/javascript' });
        const worker = new Worker(URL.createObjectURL(blob));
        worker.onmessage = (e) => {
            const key = `${e.data.cx},${e.data.cz}`;
            loadedChunks.set(key, e.data.blocks);
            e.data.blocks.forEach(b => worldData.set(`${b.px},${b.py},${b.pz}`, b.id));
            updateInstances();
        };

        function init() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 500);
            camera.rotation.order = 'YXZ';
            renderer = new THREE.WebGLRenderer({ antialias: false });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);

            const loader = new THREE.TextureLoader();
            Object.keys(ITEM_DEFS).forEach(id => {
                loader.load(`texture/${id}/${id}.png`, (tex) => {
                    tex.magFilter = THREE.NearestFilter; tex.minFilter = THREE.NearestFilter;
                    const mat = new THREE.MeshLambertMaterial({ map: tex, transparent: (id=="6"||id=="5"), opacity: (id=="6"?0.7:1) });
                    const geo = new THREE.BoxGeometry(SCALE, SCALE, SCALE);
                    // UVトリミング
                    const uv = geo.attributes.uv;
                    const faceMap = [{x:16,y:8,rot:1},{x:0,y:8,rot:3},{x:8,y:8,rot:0},{x:24,y:8,rot:0},{x:8,y:16,rot:0},{x:8,y:0,rot:2}];
                    faceMap.forEach((f, i) => {
                        let c = [{u:(f.x+0.01)/32, v:(32-f.y-0.01)/32}, {u:(f.x+7.99)/32, v:(32-f.y-0.01)/32}, {u:(f.x+0.01)/32, v:(32-f.y-7.99)/32}, {u:(f.x+7.99)/32, v:(32-f.y-7.99)/32}];
                        if (f.rot === 1) c = [c[2],c[0],c[3],c[1]];
                        uv.setXY(i*4+0,c[0].u,c[0].v); uv.setXY(i*4+1,c[1].u,c[1].v); uv.setXY(i*4+2,c[2].u,c[2].v); uv.setXY(i*4+3,c[3].u,c[3].v);
                    });
                    instances[id] = new THREE.InstancedMesh(geo, mat, 10000);
                    scene.add(instances[id]);
                });
            });

            scene.add(new THREE.AmbientLight(0xffffff, 0.6));
            updateDimensionStyle();
            setupControls();
            animate();
        }

        function updateDimensionStyle() {
            const sky = currentDimension === 0 ? 0x87ceeb : 0x441111;
            scene.background = new THREE.Color(sky);
            scene.fog = new THREE.FogExp2(sky, 0.01);
        }

        function switchDimension() {
            currentDimension = currentDimension === 0 ? 1 : 0;
            worldData.clear(); loadedChunks.clear();
            camera.position.set(0, 50, 0); yVel = 0;
            updateDimensionStyle();
        }

        function updateInstances() {
            const dummy = new THREE.Object3D();
            const counts = {}; Object.keys(instances).forEach(id => counts[id] = 0);
            const cx = Math.floor(camera.position.x/(CHUNK_SIZE*SCALE)), cz = Math.floor(camera.position.z/(CHUNK_SIZE*SCALE));

            for (let x = -VIEW_DISTANCE; x <= VIEW_DISTANCE; x++) {
                for (let z = -VIEW_DISTANCE; z <= VIEW_DISTANCE; z++) {
                    const blocks = loadedChunks.get(`${cx+x},${cz+z}`);
                    if (blocks) blocks.forEach(b => {
                        if (!instances[b.id]) return;
                        dummy.position.set(b.px, b.py, b.pz); dummy.updateMatrix();
                        instances[b.id].setMatrixAt(counts[b.id]++, dummy.matrix);
                    });
                }
            }
            Object.keys(instances).forEach(id => { instances[id].count = counts[id]; instances[id].instanceMatrix.needsUpdate = true; });
        }

        function animate() {
            requestAnimationFrame(animate);
            if (isPlaying && !isInvOpen) {
                // 落下判定
                if (camera.position.y < -80) switchDimension();

                const cx = Math.floor(camera.position.x/(CHUNK_SIZE*SCALE)), cz = Math.floor(camera.position.z/(CHUNK_SIZE*SCALE));
                for(let x=-VIEW_DISTANCE; x<=VIEW_DISTANCE; x++) for(let z=-VIEW_DISTANCE; z<=VIEW_DISTANCE; z++) {
                    const key = `${cx+x},${cz+z}`;
                    if(!loadedChunks.has(key)) { loadedChunks.set(key, []); worker.postMessage({cx:cx+x, cz:cz+z, dimension:currentDimension, SCALE, SEA_LEVEL:-SCALE, seed:123}); }
                }

                const move = new THREE.Vector3();
                const dir = new THREE.Vector3(); camera.getWorldDirection(dir); dir.y = 0; dir.normalize();
                const side = new THREE.Vector3().crossVectors(new THREE.Vector3(0,1,0), dir).normalize();
                if(keys.w) move.add(dir); if(keys.s) move.sub(dir); if(keys.a) move.add(side); if(keys.d) move.sub(side);
                
                if (move.length() > 0) {
                    const nextX = camera.position.x + move.normalize().x * PHYSICS.moveSpeed;
                    const nextZ = camera.position.z + move.z * PHYSICS.moveSpeed;
                    const check = (x, y, z) => {
                        const snap = v => Math.round(v/SCALE)*SCALE;
                        for(let ox of [-0.3, 0.3]) for(let oz of [-0.3, 0.3]) {
                            const id = worldData.get(`${snap(x+ox*SCALE)},${snap(y)},${snap(z+oz*SCALE)}`);
                            if(id && id !== 6) return true;
                        }
                        return false;
                    };
                    if(!check(nextX, camera.position.y, nextZ)) { camera.position.x = nextX; camera.position.z = nextZ; }
                    else if(!check(nextX, camera.position.y + PHYSICS.stepHeight, nextZ)) { camera.position.y += 0.2; camera.position.x = nextX; camera.position.z = nextZ; }
                }

                yVel -= PHYSICS.gravity;
                camera.position.y += yVel;
                const snap = v => Math.round(v/SCALE)*SCALE;
                if(worldData.get(`${snap(camera.position.x)},${snap(camera.position.y-SCALE*1.5)},${snap(camera.position.z)}`) && yVel < 0) {
                    yVel = keys[' '] ? PHYSICS.jumpForce : 0;
                }
            }
            renderer.render(scene, camera);
        }

        function toggleInventory() {
            isInvOpen = !isInvOpen;
            document.getElementById('inventory').style.display = isInvOpen ? 'grid' : 'none';
            if(isInvOpen) { document.exitPointerLock(); renderInventory(); } 
            else { document.body.requestPointerLock(); }
        }

        function renderInventory() {
            const content = document.getElementById('inv-content'); content.innerHTML = '';
            Object.keys(ITEM_DEFS).forEach(id => {
                if(ITEM_DEFS[id].tab !== currentInvTab || inventoryCounts[id] <= 0) return;
                const div = document.createElement('div'); div.className = 'inv-slot';
                div.style.backgroundImage = `url('texture/${id}/${id}.png')`;
                div.onclick = () => { hotbarItems[selectedSlot] = parseInt(id); updateHotbar(); toggleInventory(); };
                content.appendChild(div);
            });
        }

        function updateHotbar() {
            const hb = document.getElementById('hotbar'); hb.innerHTML = '';
            hotbarItems.forEach((id, i) => {
                const s = document.createElement('div'); s.className = 'slot' + (selectedSlot === i ? ' active' : '');
                if(id) s.style.backgroundImage = `url('texture/${id}/${id}.png')`;
                hb.appendChild(s);
            });
        }

        function setupControls() {
            document.getElementById('overlay').onclick = () => document.body.requestPointerLock();
            document.addEventListener('pointerlockchange', () => { isPlaying = !!document.pointerLockElement; document.getElementById('overlay').style.display = isPlaying ? 'none' : 'flex'; document.getElementById('crosshair').style.display = isPlaying ? 'block' : 'none'; });
            window.onkeydown = e => {
                if(e.key === 'e') toggleInventory();
                if(isInvOpen) return;
                keys[e.key.toLowerCase()] = true; if(e.key === ' ') keys[' '] = true;
                const idx = ['1','2','3','4','5','6','7','8','9','0'].indexOf(e.key);
                if(idx !== -1) { selectedSlot = idx; updateHotbar(); }
            };
            window.onkeyup = e => { keys[e.key.toLowerCase()] = false; if(e.key === ' ') keys[' '] = false; };
            window.onmousemove = e => { if(isPlaying && !isInvOpen) { camera.rotation.y -= e.movementX * 0.002; camera.rotation.x = Math.max(-1.5, Math.min(1.5, camera.rotation.x - e.movementY * 0.002)); }};
            document.querySelectorAll('#inv-tabs button').forEach(btn => btn.onclick = () => {
                document.querySelectorAll('#inv-tabs button').forEach(b => b.classList.remove('active'));
                btn.classList.add('active'); currentInvTab = btn.dataset.tab; renderInventory();
            });
            document.onmousedown = e => { if(isPlaying && !isInvOpen) handleAction(e.button === 0 ? 'destroy' : 'place'); };
        }

        function handleAction(type) {
            const ray = new THREE.Raycaster(); ray.setFromCamera(new THREE.Vector2(0,0), camera);
            const hits = ray.intersectObjects(Object.values(instances));
            if(hits.length > 0 && hits[0].distance < SCALE*10) {
                const hit = hits[0]; const p = hit.point.clone(); const n = hit.face.normal.clone();
                const snap = v => Math.round(v/SCALE)*SCALE;
                if(type === 'destroy') {
                    p.sub(n.multiplyScalar(SCALE*0.5)); const key = `${snap(p.x)},${snap(p.y)},${snap(p.z)}`;
                    const id = worldData.get(key); if(id) { inventoryCounts[id]++; worldData.delete(key); }
                    for(let b of loadedChunks.values()) { const i = b.findIndex(v => `${v.px},${v.py},${v.pz}` === key); if(i!==-1) b.splice(i,1); }
                } else {
                    p.add(n.multiplyScalar(SCALE*0.5)); const id = hotbarItems[selectedSlot];
                    if(id && inventoryCounts[id] > 0) {
                        const b = { px:snap(p.x), py:snap(p.y), pz:snap(p.z), id };
                        worldData.set(`${b.px},${b.py},${b.pz}`, id); inventoryCounts[id]--;
                        const chunkKey = `${Math.floor(b.px/(CHUNK_SIZE*SCALE))},${Math.floor(b.pz/(CHUNK_SIZE*SCALE))}`;
                        if(loadedChunks.has(chunkKey)) loadedChunks.get(chunkKey).push(b);
                    }
                }
                updateInstances();
            }
        }

        window.onload = () => { init(); updateHotbar(); };
    </script>
</body>
</html>
