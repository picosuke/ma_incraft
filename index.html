<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>8-bit Craft: Infinite Edition</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: sans-serif; user-select: none; }
        #crosshair { position: fixed; top: 50%; left: 50%; width: 16px; height: 16px; border: 2px solid white; transform: translate(-50%, -50%); mix-blend-mode: difference; display: none; z-index: 10; }
        #ui { position: fixed; top: 10px; left: 10px; color: white; background: rgba(0,0,0,0.7); padding: 10px; border-radius: 5px; font-size: 12px; pointer-events: none; z-index: 10; }
        #hotbar { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); display: flex; gap: 4px; background: rgba(0,0,0,0.8); padding: 6px; border-radius: 4px; z-index: 20; }
        .slot { width: 44px; height: 44px; border: 2px solid #555; background: #333; display: flex; align-items: center; justify-content: center; color: white; border-radius: 4px; font-size: 10px; background-size: cover; image-rendering: pixelated; position: relative; }
        .slot.active { border-color: #00ff00; transform: scale(1.1); box-shadow: 0 0 10px rgba(0,255,0,0.5); }
        #overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; color: white; background: rgba(0,0,0,0.5); font-size: 24px; cursor: pointer; z-index: 100; }
        #inventory { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: rgba(0,0,0,0.85); padding: 20px; border-radius: 8px; display: none; grid-template-columns: repeat(5, 1fr); gap: 10px; z-index: 200; border: 2px solid #fff; }
        .inv-slot { width: 44px; height: 44px; border: 2px solid #666; background: #333; cursor: pointer; background-size: cover; image-rendering: pixelated; position: relative; }
        #inv-tabs { grid-column: span 5; display: flex; gap: 8px; margin-bottom: 10px; }
        #inv-tabs button { padding: 6px 10px; background: #222; color: white; border: 1px solid #888; cursor: pointer; }
        #inv-tabs button.active { background: #00aa00; }
        #inv-content { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; }
        #hotbar-wrapper { position: fixed; bottom: 20px; left: 50%; width: 500px; transform: translateX(-50%); }
        #hp-container { position: absolute; bottom: 80px; left: 0; width: 100%; height: 15px; background: #220000; border: 2px solid #aa0000; border-radius: 100px; overflow: hidden; }
        #hp-bar { height: 100%; width: 100%; background: linear-gradient(to right, #ff0000, #ff8800); transition: width 0.2s; }
    </style>
</head>
<body>
    <div id="ui">E:インベントリ | M:次元切替 | WASD:移動 | /:破壊 \:設置 | K:セーブ L:ロード</div>
    <div id="crosshair"></div>
    <div id="hotbar-wrapper">
        <div id="hp-container"><div id="hp-bar"></div></div>
        <div id="hotbar"></div>
    </div>
    <div id="inventory">
        <div id="inv-tabs">
            <button data-tab="自然">自然</button>
            <button data-tab="建築">建築</button>
            <button data-tab="芋">芋</button>
            <button data-tab="items">Items</button>
        </div>
        <div id="inv-content"></div>
    </div>
    <div id="overlay">START</div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

    <script id="worker-script" type="text/javascript">
        // --- Web Worker 内の処理 ---
        self.onmessage = function(e) {
            const { type, cx, cz, dimension, SCALE, SEA_LEVEL, MAG_LEVEL, seed } = e.data;
            if (type === 'generate') {
                const blocks = [];
                const CHUNK_SIZE = 16;

                for (let x = 0; x < CHUNK_SIZE; x++) {
                    for (let z = 0; z < CHUNK_SIZE; z++) {
                        const wx = cx * CHUNK_SIZE + x;
                        const wz = cz * CHUNK_SIZE + z;
                        const px = wx * SCALE;
                        const pz = wz * SCALE;

                        if (dimension === 0) { // Overworld
                            let hBase = Math.sin(wx * 0.05 + seed) * Math.cos(wz * 0.05 + seed) * 3;
                            let h = Math.round(hBase);
                            const surfaceY = h * SCALE;
                            for (let y = -8 * SCALE; y <= Math.max(surfaceY, SEA_LEVEL); y += SCALE) {
                                let bid = 0;
                                if (y <= surfaceY) {
                                    if (y < surfaceY - 2 * SCALE) bid = 3;
                                    else if (y < surfaceY) bid = 2;
                                    else bid = (y <= SEA_LEVEL) ? 7 : 1;
                                } else if (y <= SEA_LEVEL) bid = 6;
                                if (bid !== 0) blocks.push({ pos: `${px},${y},${pz}`, id: bid });
                            }
                            // 簡易的な木
                            if (Math.random() > 0.98 && surfaceY > SEA_LEVEL) {
                                blocks.push({ pos: `${px},${surfaceY+SCALE},${pz}`, id: 4 });
                                blocks.push({ pos: `${px},${surfaceY+SCALE*2},${pz}`, id: 5 });
                            }
                        } else { // Satumoworld
                            let hBase = 3 + Math.sin(wx * 0.05 + seed) * Math.cos(wz * 0.05 + seed) * 4;
                            let h = Math.round(hBase);
                            const surfaceY = h * SCALE;
                            for (let y = -5 * SCALE; y <= Math.max(surfaceY, MAG_LEVEL); y += SCALE) {
                                let bid = 0;
                                if (y <= surfaceY) {
                                    bid = (y === surfaceY) ? 15 : (y > surfaceY - 2*SCALE ? 13 : 3);
                                } else if (y <= MAG_LEVEL) bid = 21;
                                if (bid !== 0) blocks.push({ pos: `${px},${y},${pz}`, id: bid });
                            }
                        }
                    }
                }
                self.postMessage({ type: 'done', cx, cz, blocks });
            }
        };
    </script>

    <script>
        // === 定数・設定 ===
        const SCALE = 4;
        const CHUNK_SIZE = 16;
        const VIEW_DISTANCE = 4; // プレイヤーの周囲何チャンクを描画するか
        const PLAYER_HEIGHT = SCALE * 1.8;
        const SEA_LEVEL = -1 * SCALE;
        const MAG_LEVEL = 1 * SCALE;
        const MAX_HP = 20;
        const PHYSICS = { gravity: SCALE*0.005, jumpForce: SCALE*0.15, moveSpeed: SCALE*0.1 };

        let playerHP = 20, lastDamageTime = 0;
        let scene, camera, renderer, sunLight;
        let isPlaying = false, isInvOpen = false, selectedSlot = 0, currentDimension = 0;
        let keys = {}, yVel = 0;
        let worldData = new Map(), lightMap = new Map();
        let loadedChunks = new Set();
        let instances = {};
        let worldSeed = Math.random() * 1000;

        const styles = [
            { name: "Overworld", sky: 0x87ceeb, fog: 0x87ceeb, fogDens: 5, sun: 0xffffff },
            { name: "Satumoworld", sky: 0xef8889, fog: 0xffffff, fogDens: 20, sun: 0xffaa00 }
        ];

        // アイテム定義
        const allPossibleIds = [1,2,3,4,5,6,7,8,10,12,13,15,16,17,18,19,20,21];
        const ITEM_DEFS = {
            1: { type: "block", tab: "自然", name: "草" },
            2: { type: "block", tab: "自然", name: "土" },
            3: { type: "block", tab: "自然", name: "石" },
            4: { type: "block", tab: "自然", name: "木" },
            5: { type: "block", tab: "自然", name: "葉" },
            6: { type: "block", tab: "自然", name: "水" },
            7: { type: "block", tab: "自然", name: "砂" },
            13: { type: "block", tab: "芋", name: "赤土" },
            15: { type: "block", tab: "芋", name: "赤草" },
            18: { type: "block", tab: "建築", name: "光源", light: { color: 0xfff2aa, intensity: 0.5, distance: SCALE * 19 } },
            21: { type: "block", tab: "自然", name: "マグマ", damage: 1, damageInterval: 500 }
        };
        const inventoryCounts = {};
        allPossibleIds.forEach(id => inventoryCounts[id] = 64);
        const hotbarItems = [1, 2, 3, 4, 5, 7, 6, 18, 21, null];
        const slotKeys = ['1','2','3','4','5','6','7','8','9','0'];

        // --- Workerのセットアップ ---
        const blob = new Blob([document.getElementById('worker-script').textContent], { type: 'text/javascript' });
        const worker = new Worker(URL.createObjectURL(blob));

        worker.onmessage = function(e) {
            if (e.data.type === 'done') {
                const { cx, cz, blocks } = e.data;
                blocks.forEach(b => worldData.set(b.pos, b.id));
                loadedChunks.add(`${cx},${cz}`);
                needsUpdate = true; // メッシュ更新フラグ
            }
        };

        let needsUpdate = false;
        let lastChunkX = NaN, lastChunkZ = NaN;

        function init() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
            camera.rotation.order = 'YXZ';

            renderer = new THREE.WebGLRenderer({ antialias: false });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);

            scene.add(new THREE.AmbientLight(0xffffff, 0.4));
            sunLight = new THREE.DirectionalLight(0xffffff, 0.7);
            sunLight.position.set(50, 100, 50);
            scene.add(sunLight);

            const loader = new THREE.TextureLoader();
            let loadedCount = 0;
            allPossibleIds.forEach(id => {
                loader.load(`texture/${id}/${id}.png`, (tex) => {
                    tex.magFilter = THREE.NearestFilter;
                    tex.minFilter = THREE.NearestFilter;
                    const mat = new THREE.MeshLambertMaterial({ 
                        map: tex, 
                        transparent: (id===6||id===21||id===5), 
                        opacity: (id===6?0.7:1),
                        alphaTest: (id===5?0.1:0)
                    });
                    const geo = new THREE.BoxGeometry(SCALE, SCALE, SCALE);
                    instances[id] = new THREE.InstancedMesh(geo, mat, 40000);
                    instances[id].frustumCulled = false;
                    scene.add(instances[id]);
                    if (++loadedCount === allPossibleIds.length) {
                        gameStarted = true;
                        updateHPBar();
                        updateHotbar();
                    }
                });
            });

            setupControls();
            animate();
        }

        function updateVisibleChunks() {
            const cx = Math.floor(camera.position.x / (CHUNK_SIZE * SCALE));
            const cz = Math.floor(camera.position.z / (CHUNK_SIZE * SCALE));

            if (cx === lastChunkX && cz === lastChunkZ) return;
            lastChunkX = cx; lastChunkZ = cz;

            // ロード範囲
            for (let x = -VIEW_DISTANCE; x <= VIEW_DISTANCE; x++) {
                for (let z = -VIEW_DISTANCE; z <= VIEW_DISTANCE; z++) {
                    const nx = cx + x;
                    const nz = cz + z;
                    const key = `${nx},${nz}`;
                    if (!loadedChunks.has(key)) {
                        worker.postMessage({ 
                            type: 'generate', cx: nx, cz: nz, 
                            dimension: currentDimension, SCALE, SEA_LEVEL, MAG_LEVEL, seed: worldSeed 
                        });
                    }
                }
            }

            // アンロード範囲（メモリ解放）
            for (const key of loadedChunks) {
                const [ax, az] = key.split(',').map(Number);
                if (Math.abs(ax - cx) > VIEW_DISTANCE + 1 || Math.abs(az - cz) > VIEW_DISTANCE + 1) {
                    unloadChunk(ax, az);
                    loadedChunks.delete(key);
                    needsUpdate = true;
                }
            }
        }

        function unloadChunk(cx, cz) {
            const startX = cx * CHUNK_SIZE * SCALE;
            const startZ = cz * CHUNK_SIZE * SCALE;
            for (let [pos, id] of worldData) {
                const [px, py, pz] = pos.split(',').map(Number);
                if (px >= startX && px < startX + CHUNK_SIZE * SCALE && pz >= startZ && pz < startZ + CHUNK_SIZE * SCALE) {
                    worldData.delete(pos);
                }
            }
        }

        function updateInstances() {
            const dummy = new THREE.Object3D();
            const counts = {};
            allPossibleIds.forEach(id => counts[id] = 0);

            worldData.forEach((id, pos) => {
                if (!instances[id]) return;
                const [x, y, z] = pos.split(',').map(Number);
                
                // 表示範囲内のみインスタンス化
                const dist = Math.hypot(x - camera.position.x, z - camera.position.z);
                if (dist > VIEW_DISTANCE * CHUNK_SIZE * SCALE) return;

                dummy.position.set(x, y, z);
                dummy.updateMatrix();
                instances[id].setMatrixAt(counts[id]++, dummy.matrix);
            });

            allPossibleIds.forEach(id => {
                if (instances[id]) {
                    instances[id].count = counts[id];
                    instances[id].instanceMatrix.needsUpdate = true;
                }
            });
            needsUpdate = false;
        }

        function checkCollision(px, py, pz) {
            const snap = (v) => Math.round(v / SCALE) * SCALE;
            const b = py - PLAYER_HEIGHT/2, t = py + PLAYER_HEIGHT/2;
            const offsets = [-1, 0, 1];
            for(let ox of offsets) for(let oz of offsets) {
                const bx = snap(px + ox*SCALE*0.3), bz = snap(pz + oz*SCALE*0.3);
                for(let by = snap(b); by <= snap(t); by += SCALE) {
                    const id = worldData.get(`${bx},${by},${bz}`);
                    if (id && id !== 6 && id !== 21) return true;
                }
            }
            return false;
        }

        function animate() {
            requestAnimationFrame(animate);
            if (isPlaying && !isInvOpen) {
                updateVisibleChunks();
                if (needsUpdate) updateInstances();

                // 移動・重力
                const move = new THREE.Vector3();
                const dir = new THREE.Vector3();
                camera.getWorldDirection(dir); dir.y = 0; dir.normalize();
                const side = new THREE.Vector3().crossVectors(new THREE.Vector3(0,1,0), dir).normalize();

                if (keys.w) move.add(dir); if (keys.s) move.sub(dir);
                if (keys.a) move.add(side); if (keys.d) move.sub(side);
                
                if (move.length() > 0) {
                    const nextX = camera.position.x + move.normalize().x * PHYSICS.moveSpeed;
                    const nextZ = camera.position.z + move.z * PHYSICS.moveSpeed;
                    if (!checkCollision(nextX, camera.position.y, camera.position.z)) camera.position.x = nextX;
                    if (!checkCollision(camera.position.x, camera.position.y, nextZ)) camera.position.z = nextZ;
                }

                yVel -= PHYSICS.gravity;
                let nextY = camera.position.y + yVel;
                if (checkCollision(camera.position.x, nextY, camera.position.z)) {
                    if (yVel < 0 && keys[' ']) yVel = PHYSICS.jumpForce;
                    else yVel = 0;
                } else {
                    camera.position.y = nextY;
                }

                // マグマダメージ
                const foot = worldData.get(`${Math.round(camera.position.x/SCALE)*SCALE},${Math.round((camera.position.y-SCALE)/SCALE)*SCALE},${Math.round(camera.position.z/SCALE)*SCALE}`);
                if (foot === 21 && Date.now() - lastDamageTime > 500) {
                    playerHP -= 1; updateHPBar(); lastDamageTime = Date.now();
                }
            }
            renderer.render(scene, camera);
        }

        // UI & 操作系
        function updateHPBar() { document.getElementById("hp-bar").style.width = (playerHP/MAX_HP*100) + "%"; }
        function updateHotbar() {
            const hb = document.getElementById('hotbar'); hb.innerHTML = '';
            hotbarItems.forEach((id, i) => {
                const s = document.createElement('div');
                s.className = 'slot' + (selectedSlot === i ? ' active' : '');
                if (id) s.style.backgroundImage = `url('texture/${id}/${id}.png')`;
                hb.appendChild(s);
            });
        }

        function setupControls() {
            document.addEventListener('mousedown', e => {
                if(!isPlaying) document.body.requestPointerLock();
                else handleAction(e.button === 0 ? 'destroy' : 'place');
            });
            document.addEventListener('pointerlockchange', () => {
                isPlaying = !!document.pointerLockElement;
                document.getElementById('overlay').style.display = isPlaying ? 'none' : 'flex';
            });
            window.onkeydown = e => {
                if(e.key === 'e') toggleInventory();
                if(isInvOpen) return;
                keys[e.key.toLowerCase()] = true;
                if(e.key === ' ') keys[' '] = true;
                const idx = slotKeys.indexOf(e.key);
                if(idx !== -1) { selectedSlot = idx; updateHotbar(); }
                if(e.key === 'm') switchDimension();
            };
            window.onkeyup = e => { keys[e.key.toLowerCase()] = false; if(e.key === ' ') keys[' '] = false; };
            window.onmousemove = e => { if(isPlaying) {
                camera.rotation.y -= e.movementX * 0.002;
                camera.rotation.x = Math.max(-1.5, Math.min(1.5, camera.rotation.x - e.movementY * 0.002));
            }};
        }

        function handleAction(type) {
            const ray = new THREE.Raycaster();
            ray.setFromCamera(new THREE.Vector2(0,0), camera);
            const activeMeshes = Object.values(instances).filter(m => m);
            const hits = ray.intersectObjects(activeMeshes);
            if (hits.length > 0 && hits[0].distance < SCALE * 10) {
                const hit = hits[0];
                const p = hit.point.clone();
                const normal = hit.face.normal.clone();
                if (type === 'destroy') {
                    p.sub(normal.multiplyScalar(SCALE*0.5));
                    worldData.delete(`${Math.round(p.x/SCALE)*SCALE},${Math.round(p.y/SCALE)*SCALE},${Math.round(p.z/SCALE)*SCALE}`);
                } else {
                    p.add(normal.multiplyScalar(SCALE*0.5));
                    const id = hotbarItems[selectedSlot];
                    if (id) worldData.set(`${Math.round(p.x/SCALE)*SCALE},${Math.round(p.y/SCALE)*SCALE},${Math.round(p.z/SCALE)*SCALE}`, id);
                }
                needsUpdate = true;
            }
        }

        function switchDimension() {
            currentDimension = currentDimension === 0 ? 1 : 0;
            worldData.clear(); loadedChunks.clear();
            const s = styles[currentDimension];
            scene.background = new THREE.Color(s.sky);
            scene.fog = new THREE.FogExp2(s.fog, s.fogDens / 1000);
            sunLight.color.setHex(s.sun);
            lastChunkX = NaN; // チャンクリロード強制
            camera.position.y = 40;
        }

        function toggleInventory() {
            isInvOpen = !isInvOpen;
            document.getElementById('inventory').style.display = isInvOpen ? 'grid' : 'none';
            if (!isInvOpen) document.body.requestPointerLock();
            else document.exitPointerLock();
        }

        init();
    </script>
</body>
</html>
